apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    iam.gke.io/gcp-service-account: crj-analytics-data-export@senku-prod.iam.gserviceaccount.com
  name: analytics-data-export
  namespace: jobs
---
apiVersion: v1
kind: Secret
metadata:
  name: data-export-env-923de72e61
  namespace: jobs
stringData:
  env.json: gcp:///projects/senku-prod/secrets/data-export-env/versions/1
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: analytics-data-export
  namespace: jobs
spec:
  jobTemplate:
    metadata: {}
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 3
      completions: 1
      parallelism: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: analytics-data-export
        spec:
          containers:
          - args:
            - sync
            env:
            - name: LOG_LEVEL
              value: info
            image: data-export
            name: app
            resources:
              limits:
                cpu: "1"
                memory: 512Mi
              requests:
                cpu: "1"
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            volumeMounts:
            - mountPath: /run/secrets
              name: data-export-env-923de72e61
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          serviceAccountName: analytics-data-export
          volumes:
          - name: data-export-env-923de72e61
            secret:
              secretName: data-export-env-923de72e61
  schedule: 0 12 * * *
  timeZone: Europe/Madrid
