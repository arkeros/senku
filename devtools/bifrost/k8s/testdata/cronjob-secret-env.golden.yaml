apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    iam.gke.io/gcp-service-account: crj-data-export@senku-prod.iam.gserviceaccount.com
  name: data-export
  namespace: jobs
---
apiVersion: v1
kind: Secret
metadata:
  name: data-export-env-4eb5035166
  namespace: jobs
stringData:
  '...': gcp:///projects/senku-prod/secrets/export-env/versions/1
  DB_HOST: gcp:///projects/senku-prod/secrets/db-config/versions/1#/host
  DB_URL: gcp:///projects/senku-prod/secrets/db-url/versions/2
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: data-export
  namespace: jobs
spec:
  jobTemplate:
    metadata: {}
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 3
      completions: 1
      parallelism: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: data-export
        spec:
          containers:
          - env:
            - name: LOG_LEVEL
              value: info
            envFrom:
            - secretRef:
                name: data-export-env-4eb5035166
            image: data-export
            name: app
            resources:
              limits:
                cpu: "1"
                memory: 512Mi
              requests:
                cpu: "1"
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          serviceAccountName: data-export
  schedule: 0 12 * * *
  timeZone: Europe/Madrid
