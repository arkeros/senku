apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    iam.gke.io/gcp-service-account: svc-myapp@senku-prod.iam.gserviceaccount.com
  name: myapp
  namespace: jobs
---
apiVersion: v1
kind: Secret
metadata:
  name: myapp-env-d02288cd0a
  namespace: jobs
stringData:
  '...': gcp:///projects/senku-prod/secrets/catalog-env/versions/1
  API_KEY: gcp:///projects/senku-prod/secrets/catalog-api-key/versions/3
  DB_HOST: gcp:///projects/senku-prod/secrets/aiven-pg-secret/versions/1#/host
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: jobs
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: myapp
  strategy: {}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: myapp
    spec:
      containers:
      - env:
        - name: APP_ENV
          value: production
        - name: PORT
          value: "8080"
        envFrom:
        - secretRef:
            name: myapp-env-d02288cd0a
        image: myapp
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
        name: app
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: myapp
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: myapp
  namespace: jobs
spec:
  maxReplicas: 3
  metrics:
  - resource:
      name: cpu
      target:
        averageUtilization: 80
        type: Utilization
    type: Resource
  minReplicas: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: myapp
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: myapp
  namespace: jobs
spec:
  resourcePolicy:
    containerPolicies:
    - containerName: app
      controlledResources:
      - memory
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: myapp
  updatePolicy:
    updateMode: InPlaceOrRecreate
---
apiVersion: v1
kind: Service
metadata:
  name: myapp
  namespace: jobs
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app.kubernetes.io/name: myapp
  type: ClusterIP
