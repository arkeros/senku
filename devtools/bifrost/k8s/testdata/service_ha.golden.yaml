apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    iam.gke.io/gcp-service-account: svc-api-gateway@senku-prod.iam.gserviceaccount.com
  name: api-gateway
  namespace: jobs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: jobs
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  strategy: {}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
    spec:
      containers:
      - env:
        - name: PORT
          value: "8080"
        image: api-gateway
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
        name: app
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "1"
          requests:
            cpu: "1"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: api-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: jobs
spec:
  maxReplicas: 5
  metrics:
  - resource:
      name: cpu
      target:
        averageUtilization: 80
        type: Utilization
    type: Resource
  minReplicas: 2
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: api-gateway
  namespace: jobs
spec:
  resourcePolicy:
    containerPolicies:
    - containerName: app
      controlledResources:
      - memory
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  updatePolicy:
    updateMode: InPlaceOrRecreate
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway
  namespace: jobs
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: jobs
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app.kubernetes.io/name: api-gateway
  type: ClusterIP
