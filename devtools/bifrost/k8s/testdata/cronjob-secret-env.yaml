apiVersion: bifrost.apotema.cloud/v1alpha1
kind: CronJob
metadata:
  name: data-export
spec:
  image: data-export
  env:
    LOG_LEVEL: info
  secretEnv:
    DB_URL: gcp:///projects/senku-prod/secrets/db-url/versions/2
    DB_HOST: gcp:///projects/senku-prod/secrets/db-config/versions/1#/host
    ...: gcp:///projects/senku-prod/secrets/export-env/versions/1
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
  schedule:
    cron: "0 12 * * *"
    timeZone: Europe/Madrid
  job:
    parallelism: 1
    completions: 1
    maxRetries: 3
    timeoutSeconds: 600
  cloudScheduler:
    retryCount: 3
