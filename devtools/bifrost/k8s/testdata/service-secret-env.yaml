apiVersion: bifrost.apotema.cloud/v1alpha1
kind: Service
metadata:
  name: myapp
spec:
  image: myapp
  env:
    APP_ENV: production
  secretEnv:
    API_KEY: gcp:///projects/senku-prod/secrets/catalog-api-key/versions/3
    DB_HOST: gcp:///projects/senku-prod/secrets/aiven-pg-secret/versions/1#/host
    ...: gcp:///projects/senku-prod/secrets/catalog-env/versions/1
  resources:
    limits:
      cpu: 500m
  probes:
    startupPath: /healthz
    livenessPath: /healthz
  autoscaling:
    min: 0
    max: 3
