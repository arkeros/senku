apiVersion: bifrost.apotema.cloud/v1alpha1
kind: Service
metadata:
  name: registry
spec:
  image: registry
  args:
    - --upstream=ghcr.io
    - --repository-prefix=arkeros/senku
  resources:
    requests:
      cpu: 250m
    limits:
      cpu: 1000m
  secretFiles:
    - secret: registry-env
      path: /run/secrets/env.json
  probes:
    startupPath: /v2/
    livenessPath: /v2/
  autoscaling:
    min: 0
    max: 3
  cloudRun:
    ingress: all
