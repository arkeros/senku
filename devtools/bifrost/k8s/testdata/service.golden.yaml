apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    iam.gke.io/gcp-service-account: svc-registry@senku-prod.iam.gserviceaccount.com
  name: registry
  namespace: jobs
---
apiVersion: v1
data:
  "1": Z2NwOi8vL3Byb2plY3RzL3Nlbmt1LXByb2Qvc2VjcmV0cy9yZWdpc3RyeS1lbnYvdmVyc2lvbnMvMQ==
kind: Secret
metadata:
  name: registry-env-346292ecae
  namespace: jobs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: jobs
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: registry
  strategy: {}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry
    spec:
      containers:
      - args:
        - --upstream=ghcr.io
        - --repository-prefix=arkeros/senku
        env:
        - name: LOG_LEVEL
          value: info
        - name: PORT
          value: "8080"
        image: registry
        livenessProbe:
          httpGet:
            path: /v2/
            port: 8080
        name: app
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "1"
          requests:
            cpu: 250m
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        startupProbe:
          httpGet:
            path: /v2/
            port: 8080
        volumeMounts:
        - mountPath: /run/secrets
          name: registry-env-346292ecae
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: registry
      volumes:
      - name: registry-env-346292ecae
        secret:
          items:
          - key: "1"
            path: env.json
          secretName: registry-env-346292ecae
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: registry
  namespace: jobs
spec:
  maxReplicas: 3
  metrics:
  - resource:
      name: cpu
      target:
        averageUtilization: 80
        type: Utilization
    type: Resource
  minReplicas: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: registry
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: registry
  namespace: jobs
spec:
  resourcePolicy:
    containerPolicies:
    - containerName: app
      controlledResources:
      - memory
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: registry
  updatePolicy:
    updateMode: InPlaceOrRecreate
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: jobs
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app.kubernetes.io/name: registry
  type: ClusterIP
