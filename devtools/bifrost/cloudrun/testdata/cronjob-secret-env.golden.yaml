apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  labels:
    cloud.googleapis.com/location: europe-west1
  name: data-export
  namespace: "874944788122"
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/secrets: other-project--export-key:projects/other-project/secrets/export-key
    spec:
      parallelism: 1
      taskCount: 1
      template:
        spec:
          containers:
          - env:
            - name: LOG_LEVEL
              value: info
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  key: "2"
                  name: db-url
            - name: EXPORT_KEY
              valueFrom:
                secretKeyRef:
                  key: "1"
                  name: other-project--export-key
            image: data-export
            name: app
            resources:
              limits:
                cpu: "1"
                memory: 512Mi
              requests:
                cpu: "1"
                memory: 512Mi
          maxRetries: 3
          serviceAccountName: crj-data-export@senku-prod.iam.gserviceaccount.com
          timeoutSeconds: "600"
