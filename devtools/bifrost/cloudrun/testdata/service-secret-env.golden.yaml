apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  annotations:
    run.googleapis.com/ingress: all
  labels:
    cloud.googleapis.com/location: europe-west1
  name: myapp
  namespace: "874944788122"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "3"
        autoscaling.knative.dev/minScale: "0"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/secrets: shared-infra--token:projects/shared-infra/secrets/token
    spec:
      containerConcurrency: 80
      containers:
      - env:
        - name: APP_ENV
          value: production
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              key: "3"
              name: catalog-api-key
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              key: "1"
              name: db-pass
        - name: SHARED_TOKEN
          valueFrom:
            secretKeyRef:
              key: "5"
              name: shared-infra--token
        image: myapp
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
        name: app
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 500m
            memory: 256Mi
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
      serviceAccountName: svc-myapp@senku-prod.iam.gserviceaccount.com
  traffic:
  - latestRevision: true
    percent: 100
