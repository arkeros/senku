apiVersion: bifrost.apotema.cloud/v1alpha1
kind: Service
metadata:
  name: myapp
spec:
  image: myapp
  env:
    APP_ENV: production
  secretEnv:
    API_KEY: gcp:///projects/senku-prod/secrets/catalog-api-key/versions/3
    DB_PASS: gcp:///projects/senku-prod/secrets/db-pass/versions/1
    SHARED_TOKEN: gcp:///projects/shared-infra/secrets/token/versions/5
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
  probes:
    startupPath: /healthz
    livenessPath: /healthz
  autoscaling:
    min: 0
    max: 3
