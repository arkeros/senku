apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  annotations:
    run.googleapis.com/ingress: all
  labels:
    cloud.googleapis.com/location: europe-west1
  name: registry
  namespace: "874944788122"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "3"
        autoscaling.knative.dev/minScale: "0"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      containers:
      - args:
        - --upstream=ghcr.io
        - --repository-prefix=arkeros/senku
        image: registry
        livenessProbe:
          httpGet:
            path: /v2/
            port: 8080
        name: app
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "1"
            memory: 256Mi
          requests:
            cpu: 250m
            memory: 256Mi
        startupProbe:
          httpGet:
            path: /v2/
            port: 8080
        volumeMounts:
        - mountPath: /run/secrets
          name: registry-env
      serviceAccountName: svc-registry@senku-prod.iam.gserviceaccount.com
      volumes:
      - name: registry-env
        secret:
          items:
          - key: latest
            path: env.json
          secretName: registry-env
  traffic:
  - latestRevision: true
    percent: 100
