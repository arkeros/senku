apiVersion: bifrost.apotema.cloud/v1alpha1
kind: CronJob
metadata:
  name: test-job
spec:
  image: test-image
  resources:
    limits:
      cpu: "1"
      memory: 256Mi
  secretFiles:
    - secret: my-secret
      version: 1
      path: /run/secrets/env.json
  schedule:
    cron: "0 12 * * *"
    timeZone: Europe/Madrid
