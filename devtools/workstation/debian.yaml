#  Anytime this file is changed, the lockfile needs to be regenerated:
#
#     bazel run @workstation//:lock
#
#  Tracks Debian unstable on the same snapshot timestamp as
#  //oci/distroless:debian.yaml so the workstation image and the distroless
#  bases share a consistent libc6 / openssl / etc. across the monorepo.
version: 1
sources:
  - channel: unstable main contrib
    urls:
      - https://snapshot-cloudflare.debian.org/archive/debian/20260504T025922Z
      - https://snapshot.debian.org/archive/debian/20260504T025922Z
archs:
  - amd64
  - arm64
packages:
  - systemd
  - systemd-sysv
  - sudo
  - ca-certificates
  - dbus-user-session
  - bash
  - coreutils
  - dash
  - diffutils
  - findutils
  - grep
  - gzip
  - mawk
  - ncurses-base
  - ncurses-bin
  - sed
  - tar
  - util-linux
  - which
  - libc-bin
  - curl
  - jq
  - git
  - openssh-client
  - gh
  - ripgrep
  - less
  - neovim
  - zoxide
  - hostname
  - iproute2
  - iputils-ping
  - dnsutils
  - netcat-openbsd
  - htop
  - ncdu
  - psmisc
  - tree
  - tmux
  - build-essential
  - docker.io
  - docker-cli
  - docker-buildx
  - direnv
  - fish
