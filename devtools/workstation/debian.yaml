#  Anytime this file is changed, the lockfile needs to be regenerated:
#
#     bazel run @workstation//:lock
#
#  Tracks Debian unstable on the same snapshot timestamp as
#  //oci/distroless:debian.yaml so the workstation image and the distroless
#  bases share a consistent libc6 / openssl / etc. across the monorepo.
version: 1
sources:
  - channel: unstable main contrib
    urls:
      - https://snapshot-cloudflare.debian.org/archive/debian/20260501T000000Z
      - https://snapshot.debian.org/archive/debian/20260501T000000Z
archs:
  - amd64
  - arm64
packages:
  # Tier 0 — required for the image to function as an exe.dev VM
  - systemd
  - systemd-sysv
  - sudo
  - ca-certificates
  - dbus-user-session
  - bash
  - coreutils
  # Debian's "Essential: yes" closure that we don't get for free — apt
  # postinst scripts don't run under rules_distroless, so packages
  # normally assumed-installed need to be listed.
  - dash
  - diffutils
  - findutils
  - grep
  - gzip
  - mawk
  - ncurses-base
  - ncurses-bin
  - sed
  - tar
  - util-linux     # provides su, login, mountpoint, more, etc.
  - which
  - libc-bin       # provides getent, ldconfig, locale
  # Tier 1 — out-of-band install plumbing (curl/jq used by setup scripts and
  # by the bundled agent installers)
  - curl
  - jq
  # Developer baseline — git over ssh needs openssh-client (sshd itself is
  # masked; exe.dev's shelley handles inbound)
  - git
  - openssh-client
  - gh
  - ripgrep
  - less          # git's default pager
  - neovim
  - zoxide        # smarter cd
  # Diagnosis / network tooling
  - hostname
  - iproute2      # `ip` command
  - iputils-ping
  - dnsutils      # dig, nslookup
  - netcat-openbsd  # `nc`
  # Process / disk inspection
  - htop
  - ncdu
  - psmisc        # killall, pstree, fuser
  - tree
  # Session multiplexer
  - tmux
  # C toolchain — bazel's cc_autoconf needs gcc on PATH even for builds
  # that don't compile C themselves; cgo / rules_go assume it exists.
  - build-essential
  # Container runtime — docker.io matches CI exactly (BuildBuddy
  # executors run docker) and is the path of least surprise for
  # rules_img / container_structure_test. docker-buildx covers the
  # buildkit features rules_img can call into.
  - docker.io
  - docker-cli
  - docker-buildx
  # The three tools this image is for
  - direnv
  - fish
