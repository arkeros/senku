name: Update RPM Packages
on:
  workflow_dispatch:
  schedule:
    # 30 min offset from the Debian cron so the two workflows don't collide
    # on the BuildBuddy executor pool.
    - cron: "30 16 * * *"
jobs:
  update:
    name: Update RPM packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bazelisk
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
      - name: Update RPM packages
        uses: arkeros/senku/.github/actions/update-rpm-packages@main
        with:
          repos: >-
            hummingbird
            nginx_stable_rpm
            nginx_mainline_rpm
          token: ${{ secrets.RENOVATE_TOKEN }}
