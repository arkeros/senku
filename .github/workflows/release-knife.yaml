name: Release knife
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and release knife
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Bazelisk
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
      # NOTE: When x_defs are added to the knife go_binary for --version
      # stamping, add --stamp here and compare unstamped SHAs instead, or
      # drop change detection entirely and release on every push.
      - name: Build (native, for change detection)
        run: bazel build //bazel/cmd/knife
      - name: Check if binary changed
        id: check
        run: |
          NEW_SHA=$(sha256sum bazel-bin/bazel/cmd/knife/knife_/knife | cut -d' ' -f1)

          LATEST_TAG=$(gh release list --repo "${{ github.repository }}" --json tagName --jq '[.[] | select(.tagName | startswith("knife/"))][0].tagName // empty')
          OLD_SHA=$([ -n "$LATEST_TAG" ] \
            && gh release download "$LATEST_TAG" --repo "${{ github.repository }}" --pattern knife-linux-amd64 --dir /tmp/knife-latest \
            && sha256sum /tmp/knife-latest/knife-linux-amd64 | cut -d' ' -f1 \
            || echo "none")

          [ "$NEW_SHA" != "$OLD_SHA" ] && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Cross-compile
        if: steps.check.outputs.changed == 'true'
        run: |
          PLATFORMS=(
            linux_amd64
            linux_arm64
            darwin_amd64
            darwin_arm64
          )
          for platform in "${PLATFORMS[@]}"; do
            bazel build --platforms="@rules_go//go/toolchain:${platform}" //bazel/cmd/knife
            cp bazel-bin/bazel/cmd/knife/knife_/knife "knife-${platform//_/-}"
          done
      - name: Publish release
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION=$(./bazel/workspace_status.sh | grep STABLE_MONOREPO_SHORT_VERSION | cut -d' ' -f2)
          TAG="knife/v${VERSION}"
          gh release create "$TAG" knife-* --title "knife ${VERSION}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
