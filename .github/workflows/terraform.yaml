---
name: Terraform
on:
  push:
    branches: [main]
    paths: ["**/terraform/**"]
  pull_request:
    branches: [main]
    paths: ["**/terraform/**"]

jobs:
  terraform:
    name: ${{ github.event_name == 'push' && 'Apply' || 'Plan' }} (${{ matrix.dir }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    strategy:
      matrix:
        dir:
          - bazel/terraform
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/874944788122/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-actions-senku@senku-prod.iam.gserviceaccount.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Init
        run: terraform init

      - name: Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const output = `${{ steps.plan.outputs.stdout }}`;
            const body = `### Terraform Plan (\`${{ matrix.dir }}\`)
            \`\`\`
            ${output.substring(0, 60000)}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Apply
        if: github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
