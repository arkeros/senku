name: Update Grype Database
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
jobs:
  update:
    name: Update Grype vulnerability database
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bazelisk
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
      - name: Install knife
        uses: arkeros/senku/.github/actions/setup-knife@main
        with:
          target: //bazel/cmd/knife
      - name: Update Grype database
        uses: arkeros/senku/.github/actions/update-grype-db@main
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
