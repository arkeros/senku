name: Update Debian Packages
on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"
jobs:
  update:
    name: Update Debian packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bazelisk
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
      - name: Install knife
        uses: arkeros/senku/.github/actions/setup-knife@main
        with:
          target: //bazel/cmd/knife
      - name: Update Debian packages
        uses: arkeros/senku/.github/actions/update-debian-packages@main
        with:
          manifests: >-
            oci/distroless/debian13.yaml
            oci/distroless/nginx/nginx-stable.yaml
            oci/distroless/nginx/nginx-mainline.yaml
          token: ${{ secrets.RENOVATE_TOKEN }}
