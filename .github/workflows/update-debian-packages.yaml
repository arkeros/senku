name: Update Debian Packages
on:
  workflow_dispatch: # Allow manual trigger
  schedule:
    - cron: "0 16 * * *" # Run every day at 4PM UTC (after daily snapshots ~14:30 UTC)

jobs:
  update:
    uses: arkeros/senku/.github/workflows/knife-update-debian-packages.yaml@main
    with:
      knife-target: //bazel/cmd/knife
      bazelrc: |
        common --config=ci
        common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
      manifests: >-
        oci/distroless/debian13.yaml
        oci/distroless/nginx/nginx-stable.yaml
        oci/distroless/nginx/nginx-mainline.yaml
    secrets:
      token: ${{ secrets.RENOVATE_TOKEN }}
