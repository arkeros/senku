name: Release CLI tools
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Release ${{ matrix.tool }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - tool: knife
            package: //bazel/cmd/knife
          - tool: bifrost
            package: //devtools/bifrost/cli
          - tool: resolve-secrets
            package: //platform/k8s/resolve-secrets
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Bazelisk
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
      # NOTE: When x_defs are added to go_binary targets for --version
      # stamping, add --stamp here and compare unstamped SHAs instead, or
      # drop change detection entirely and release on every push.
      - name: Build all platforms
        run: |
          bazel build --remote_download_outputs=toplevel ${{ matrix.package }}/...
          for platform in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            cp "$(bazel cquery --output=files "${{ matrix.package }}:${{ matrix.tool }}-${platform}")" "${{ matrix.tool }}-${platform}"
          done
      - name: Check if binaries changed
        id: check
        run: |
          TOOL="${{ matrix.tool }}"
          LATEST_TAG=$(gh release list --repo "${{ github.repository }}" --json tagName --jq "[.[] | select(.tagName | startswith(\"${TOOL}/\"))][0].tagName // empty")

          if [ -z "$LATEST_TAG" ]; then
            echo "No previous release found, releasing"
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Comparing against ${LATEST_TAG}"
          gh release download "$LATEST_TAG" --repo "${{ github.repository }}" --pattern "${TOOL}-*" --dir "/tmp/${TOOL}-latest"

          CHANGED=false
          for platform in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            NEW_SHA=$(sha256sum "${TOOL}-${platform}" | cut -d' ' -f1)
            if [ -f "/tmp/${TOOL}-latest/${TOOL}-${platform}" ]; then
              OLD_SHA=$(sha256sum "/tmp/${TOOL}-latest/${TOOL}-${platform}" | cut -d' ' -f1)
            else
              OLD_SHA="none"
            fi
            if [ "$NEW_SHA" != "$OLD_SHA" ]; then
              echo "${platform}: changed (${OLD_SHA} -> ${NEW_SHA})"
              CHANGED=true
              break
            else
              echo "${platform}: unchanged (${NEW_SHA})"
            fi
          done

          if [ "$CHANGED" = "false" ]; then
            echo "All binaries unchanged, skipping release"
          fi
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT
          echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Attest provenance
        if: steps.check.outputs.changed == 'true'
        uses: actions/attest@v4
        with:
          subject-path: ${{ matrix.tool }}-*
      - name: Publish release
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION=$(./bazel/workspace_status.sh | grep STABLE_MONOREPO_SHORT_VERSION | cut -d' ' -f2)
          TAG="${{ matrix.tool }}/v${VERSION}"
          if [ -n "${{ steps.check.outputs.latest_tag }}" ]; then
            gh release create "$TAG" ${{ matrix.tool }}-* --title "${{ matrix.tool }} ${VERSION}" --generate-notes --notes-start-tag "${{ steps.check.outputs.latest_tag }}"
          else
            gh release create "$TAG" ${{ matrix.tool }}-* --title "${{ matrix.tool }} ${VERSION}" --notes "Initial release"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-versions-bzl:
    name: Refresh versions.bzl
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Push back to main needs a working tree tracking the branch.
          ref: main
          fetch-depth: 0
      - name: Set up Bazelisk
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Regenerate versions.bzl per tool
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          bazel build //bazel/cmd/knife
          KNIFE=$(bazel cquery --output=files //bazel/cmd/knife)

          # Refreshing unconditionally is cheap: Write is idempotent, so
          # tools whose versions.bzl already reflects the latest release
          # produce no diff and the subsequent commit step skips them.
          "$KNIFE" prebuilts list | while read -r tool; do
            echo "::group::$tool"
            "$KNIFE" prebuilts update --tool "$tool"
            if git diff --quiet; then
              echo "no changes"
            else
              git add -A
              git commit -m "chore(${tool}): refresh versions.bzl"
            fi
            echo "::endgroup::"
          done
      - name: Show pending diff
        id: diff
        run: |
          set -euo pipefail
          if git log origin/main..HEAD --oneline | grep -q .; then
            echo "Commits to push:"
            git log --oneline origin/main..HEAD
            echo
            echo "Aggregated diff:"
            git diff origin/main..HEAD
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to push"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Push to main
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          # Race-safe push: if main advanced while we ran, rebase and retry.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git fetch origin main
            git rebase origin/main
            sleep $((RANDOM % 5 + 1))
          done
          echo "Failed to push after 5 attempts" >&2
          exit 1
