---
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Bump together. The sha256 must match `aspect-cli-x86_64-unknown-linux-musl`
  # for the pinned tag — re-compute via:
  #   curl -fsSL https://github.com/aspect-build/aspect-cli/releases/download/${ASPECT_CLI_VERSION}/aspect-cli-x86_64-unknown-linux-musl | sha256sum
  ASPECT_CLI_VERSION: v2026.17.17
  ASPECT_CLI_SHA256: db45968e114c22af0e0d3dddadfb7091c81983f66499eed9d01d782bb09483d0

jobs:
  build:
    name: Build and test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      matrix: ${{ steps.meta.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-version: v1.27.0
          bazelisk-cache: true
          repository-cache: true
          external-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Test
        run: bazel test //...

      - name: Build
        run: bazel build //...

      - name: Enable stamping
        if: github.event_name == 'push'
        run: echo "build --stamp" >> .bazelrc

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images and collect metadata
        if: github.event_name == 'push'
        id: meta
        run: |
          set -euxo pipefail
          # Skip `_gar` push targets — `aspect apply` re-pushes those via
          # the registry root's `pre_apply` hook, against the same digest.
          # build only mirrors images to GHCR (the public-facing copy).
          TARGETS=$(bazel query 'kind("image_push rule", //...)' --output=label | grep -v '_gar$')
          MATRIX="[]"
          for TARGET in $TARGETS; do
            bazel run "$TARGET"

            MANIFEST=$(bazel cquery "$TARGET" --output=files --output_groups=deploy_manifest)
            bazel build --output_groups=deploy_manifest --remote_download_outputs=all "$TARGET"
            REGISTRY=$(jq -r '.operations[0].registry' "$MANIFEST")
            REPOSITORY=$(jq -r '.operations[0].repository' "$MANIFEST")
            DIGEST=$(jq -r '.operations[0].root.digest' "$MANIFEST")

            IMAGE_TARGET=$(bazel query "labels(image, $TARGET)" --output=label)
            TAG=$(jq -r '.operations[0].tags[] | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+(-debug)?$"))' "$MANIFEST")

            MATRIX=$(echo "$MATRIX" | jq -c --arg image "${REGISTRY}/${REPOSITORY}" --arg tag "$TAG" --arg digest "$DIGEST" --arg target "$IMAGE_TARGET" '. + [{"image": $image, "tag": $tag, "digest": $digest, "target": $target}]')
          done
          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"

  attest:
    name: Attest ${{ matrix.image }}:${{ matrix.tag }}
    if: github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    strategy:
      matrix: ${{ fromJSON(needs.build.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-version: v1.27.0
          bazelisk-cache: true
          repository-cache: true
          external-cache: true
          cache-save: false
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download SBOM
        run: |
          bazel build --output_groups=sbom --remote_download_outputs=all "${{ matrix.target }}"
          SBOM_FILE=$(bazel cquery "${{ matrix.target }}" --output=files --output_groups=sbom)
          cp "$SBOM_FILE" sbom.spdx.json

      - name: Attest provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ matrix.digest }}
          push-to-registry: true

      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ matrix.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

  # ---------------------------------------------------------------------------
  # Terraform deploys, orchestrated via Aspect CLI.
  #
  # `aspect plan` / `aspect apply` walk the ordered list of roots from
  # `.aspect/stdlib.axl` (`TF_ROOTS`). Same commands work locally and in CI.
  # `aspect plan` itself upserts per-root PR comments via the
  # //devtools/build/tools/tf_pr_comment Go binary when run under `$CI` —
  # see `.aspect/plan.axl`. CI's job is just to provide the auth + token;
  # no fan-out, no matrix, no follow-up github-script step.
  # ---------------------------------------------------------------------------

  plan:
    name: Terraform Plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # `pr-plan` is unprotected (any branch, no reviewers) — its job is
    # to make every plan-path token environment-tagged so the WIF
    # principalSet for the plan SA has a specific claim to bind to.
    # The plan SA itself only carries read-only roles, so an unprotected
    # environment is the right trade-off: PR plans must run on any branch.
    environment: pr-plan
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-version: v1.27.0
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Install Aspect CLI
        run: |
          set -euo pipefail
          # Pinned via top-of-file env vars. No official setup-aspect-cli
          # action exists yet; this is the documented Linux CI install
          # pattern. Hermetic: sha256 verified against the pinned digest.
          curl -fsSL \
            "https://github.com/aspect-build/aspect-cli/releases/download/${ASPECT_CLI_VERSION}/aspect-cli-x86_64-unknown-linux-musl" \
            -o /tmp/aspect
          echo "${ASPECT_CLI_SHA256}  /tmp/aspect" | sha256sum -c -
          chmod +x /tmp/aspect
          sudo mv /tmp/aspect /usr/local/bin/aspect
          aspect --version

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/874944788122/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-actions-senku-plan@senku-prod.iam.gserviceaccount.com

      - name: Plan
        env:
          # The tf_pr_comment Go binary that `aspect plan` invokes uses
          # the same env vars as `gh` for auth. The action's default
          # token has `pull-requests: write` (set above), which is what
          # we need to upsert per-root plan comments.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: aspect plan

  apply:
    name: Terraform Apply
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # `prod` is configured in repo settings with `main`-only deployment
    # branches and required reviewers. GitHub validates both *before*
    # minting the OIDC token, so the branch/reviewer gate lives in the
    # identity layer — not in this YAML, which any committer can edit.
    # The apply SA's WIF binding is keyed on `attribute.environment/prod`,
    # so a token from any other environment cannot impersonate it.
    environment: prod
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-version: v1.27.0
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Install Aspect CLI
        run: |
          set -euo pipefail
          # Pinned via top-of-file env vars. No official setup-aspect-cli
          # action exists yet; this is the documented Linux CI install
          # pattern. Hermetic: sha256 verified against the pinned digest.
          curl -fsSL \
            "https://github.com/aspect-build/aspect-cli/releases/download/${ASPECT_CLI_VERSION}/aspect-cli-x86_64-unknown-linux-musl" \
            -o /tmp/aspect
          echo "${ASPECT_CLI_SHA256}  /tmp/aspect" | sha256sum -c -
          chmod +x /tmp/aspect
          sudo mv /tmp/aspect /usr/local/bin/aspect
          aspect --version

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/874944788122/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-actions-senku-apply@senku-prod.iam.gserviceaccount.com
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: europe-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Apply
        run: aspect apply
