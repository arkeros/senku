---
name: CI
on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-version: v1.27.0
          bazelrc: |
            common --config=ci

      - name: Test
        run: bazel test //...

      - name: Build
        run: bazel build //...
