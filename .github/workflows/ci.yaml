---
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Bump together. The sha256 must match `aspect-cli-x86_64-unknown-linux-musl`
  # for the pinned tag — re-compute via:
  #   curl -fsSL https://github.com/aspect-build/aspect-cli/releases/download/${ASPECT_CLI_VERSION}/aspect-cli-x86_64-unknown-linux-musl | sha256sum
  ASPECT_CLI_VERSION: v2026.17.17
  ASPECT_CLI_SHA256: db45968e114c22af0e0d3dddadfb7091c81983f66499eed9d01d782bb09483d0

jobs:
  publish:
    name: Publish mirror images
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for cosign keyless OIDC (Fulcio + Rekor)
      packages: write   # for GHCR push + cosign sig/attest artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-version: v1.27.0
          bazelisk-cache: true
          repository-cache: true
          external-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
            build --stamp

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Load consumer-side cosign policy (regex + issuer) from the same
      # Starlark source that mirror_push uses for the predicate's BUILDER_ID.
      # See //oci:cosign_policy.bzl. Renames to the workflow file or branch
      # only need to be done in that one Starlark file.
      - name: Load cosign policy
        run: |
          set -euxo pipefail
          bazel build //oci:cosign_policy_env
          cat "$(bazel cquery //oci:cosign_policy_env --output=files)" >> "$GITHUB_ENV"

      # Bazel-native cosign signing per ADR 0006. `mirror_push` macros emit
      # <name>_push, <name>_sign, <name>_attest, optional <name>_attest_sbom.
      # Discover via `cosign_sign rule` since that's unambiguous: every mirror
      # image has exactly one. The matching push/attest targets follow naming.
      # We collect (BASE, registry, repository, digest) tuples for the
      # post-publish positive verify step.
      - name: Push, sign, and attest mirror images
        id: publish
        run: |
          set -euxo pipefail
          SIGN_TARGETS=$(bazel query 'kind("cosign_sign rule", //...)' --output=label)
          PUBLISHED=""
          for SIGN_TARGET in $SIGN_TARGETS; do
            BASE=${SIGN_TARGET%_sign}
            echo "::group::${BASE}"
            bazel run "${BASE}_push"
            bazel run "${BASE}_sign"
            bazel run "${BASE}_attest"
            HAS_SBOM=0
            if bazel query "${BASE}_attest_sbom" 2>/dev/null | grep -q .; then
              bazel run "${BASE}_attest_sbom"
              HAS_SBOM=1
            fi

            # Capture the just-pushed digest for the positive verify step.
            bazel build --output_groups=deploy_manifest --remote_download_outputs=all "${BASE}_push"
            MANIFEST=$(bazel cquery "${BASE}_push" --output=files --output_groups=deploy_manifest)
            REGISTRY=$(jq -r '.operations[0].registry' "$MANIFEST")
            REPOSITORY=$(jq -r '.operations[0].repository' "$MANIFEST")
            DIGEST=$(jq -r '.operations[0].root.digest' "$MANIFEST")
            PUBLISHED+="${REGISTRY}/${REPOSITORY}@${DIGEST} ${HAS_SBOM}"$'\n'
            echo "::endgroup::"
          done
          # Persist for the next step. EOF-delimited heredoc handles newlines.
          {
            echo 'PUBLISHED<<EOF'
            printf '%s' "$PUBLISHED"
            echo 'EOF'
          } >> "$GITHUB_ENV"

      # Positive test: every just-published image must verify under the
      # production policy with both predicate types. Catches mis-attested
      # predicates, wrong type strings, Rekor-upload misconfig, and OIDC
      # subject drift between producer (BUILDER_ID) and consumer (regex).
      - name: Verify just-published images (positive test)
        run: |
          set -euo pipefail
          COSIGN=$(bazel cquery //bazel/toolchains/cosign:compiled_cosign_toolchain --output=files)
          while IFS=' ' read -r REF HAS_SBOM; do
            [[ -z "$REF" ]] && continue
            echo "::group::verify ${REF}"
            "${COSIGN}" verify-attestation \
                --certificate-identity-regexp="${COSIGN_POLICY_CERTIFICATE_IDENTITY_REGEXP}" \
                --certificate-oidc-issuer="${COSIGN_POLICY_CERTIFICATE_OIDC_ISSUER}" \
                --type=slsaprovenance \
                "${REF}" > /dev/null
            if [[ "${HAS_SBOM}" == "1" ]]; then
              "${COSIGN}" verify-attestation \
                  --certificate-identity-regexp="${COSIGN_POLICY_CERTIFICATE_IDENTITY_REGEXP}" \
                  --certificate-oidc-issuer="${COSIGN_POLICY_CERTIFICATE_OIDC_ISSUER}" \
                  --type=cyclonedx \
                  "${REF}" > /dev/null
            fi
            echo "OK: ${REF}"
            echo "::endgroup::"
          done <<< "${PUBLISHED}"

      # Negative test: production verify policy must REJECT a real-but-wrong-
      # identity image (Google's distroless, signed by their workflow). If a
      # future PR widens the verify regex, this assertion starts failing-when-
      # it-should-fail and CI catches it. Per ADR 0006.
      - name: Verify policy is strict (negative test)
        run: |
          set -euo pipefail
          COSIGN=$(bazel cquery //bazel/toolchains/cosign:compiled_cosign_toolchain --output=files)
          STDERR=$(mktemp)
          # Negative case: rejects a correctly-signed-but-wrong-identity image.
          if "${COSIGN}" verify-attestation \
              --certificate-identity-regexp="${COSIGN_POLICY_CERTIFICATE_IDENTITY_REGEXP}" \
              --certificate-oidc-issuer="${COSIGN_POLICY_CERTIFICATE_OIDC_ISSUER}" \
              --type=slsaprovenance \
              gcr.io/distroless/static-debian12:nonroot 2> "${STDERR}"; then
            echo "ERROR: verify policy is too permissive — accepted gcr.io/distroless/static-debian12:nonroot, which was signed by Google's distroless workflow, not ours." >&2
            echo "--- cosign stderr ---" >&2
            cat "${STDERR}" >&2
            exit 1
          fi
          echo "OK: verify policy correctly rejects the signed-by-Google reference."
          echo "--- cosign rejection reason (for the record) ---"
          cat "${STDERR}"

  # ---------------------------------------------------------------------------
  # Terraform deploys, orchestrated via Aspect CLI.
  #
  # `aspect plan` / `aspect apply` walk the ordered list of roots from
  # `.aspect/stdlib.axl` (`TF_ROOTS`). Same commands work locally and in CI.
  # `aspect plan` itself upserts per-root PR comments via the
  # //devtools/build/tools/tf_pr_comment Go binary when run under `$CI` —
  # see `.aspect/plan.axl`. CI's job is just to provide the auth + token;
  # no fan-out, no matrix, no follow-up github-script step.
  # ---------------------------------------------------------------------------

  plan:
    name: Terraform Plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # `pr-plan` is unprotected (any branch, no reviewers) — its job is
    # to make every plan-path token environment-tagged so the WIF
    # principalSet for the plan SA has a specific claim to bind to.
    # The plan SA itself only carries read-only roles, so an unprotected
    # environment is the right trade-off: PR plans must run on any branch.
    environment: pr-plan
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-version: v1.27.0
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Install Aspect CLI
        uses: ./.github/actions/setup-aspect
        with:
          version: ${{ env.ASPECT_CLI_VERSION }}
          sha256: ${{ env.ASPECT_CLI_SHA256 }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/874944788122/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-actions-senku-plan@senku-prod.iam.gserviceaccount.com

      - name: Plan
        env:
          # The tf_pr_comment Go binary that `aspect plan` invokes uses
          # the same env vars as `gh` for auth. The action's default
          # token has `pull-requests: write` (set above), which is what
          # we need to upsert per-root plan comments.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: aspect plan

  apply:
    name: Terraform Apply
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # `prod` is configured in repo settings with `main`-only deployment
    # branches and required reviewers. GitHub validates both *before*
    # minting the OIDC token, so the branch/reviewer gate lives in the
    # identity layer — not in this YAML, which any committer can edit.
    # The apply SA's WIF binding is keyed on `attribute.environment/prod`,
    # so a token from any other environment cannot impersonate it.
    environment: prod
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-version: v1.27.0
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Install Aspect CLI
        uses: ./.github/actions/setup-aspect
        with:
          version: ${{ env.ASPECT_CLI_VERSION }}
          sha256: ${{ env.ASPECT_CLI_SHA256 }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/874944788122/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-actions-senku-apply@senku-prod.iam.gserviceaccount.com
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: europe-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Apply
        run: aspect apply
