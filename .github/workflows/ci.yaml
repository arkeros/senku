---
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      matrix: ${{ steps.meta.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-version: v1.27.0
          bazelisk-cache: true
          repository-cache: true
          external-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Test
        run: bazel test //...

      - name: Build
        run: bazel build //...

      - name: Enable stamping
        if: github.event_name == 'push'
        run: echo "build --stamp" >> .bazelrc

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images and collect metadata
        if: github.event_name == 'push'
        id: meta
        run: |
          set -euxo pipefail
          # Skip `_gar` push targets — `aspect apply` re-pushes those via
          # the registry root's `pre_apply` hook, against the same digest.
          # build only mirrors images to GHCR (the public-facing copy).
          TARGETS=$(bazel query 'kind("image_push rule", //...)' --output=label | grep -v '_gar$')
          MATRIX="[]"
          for TARGET in $TARGETS; do
            bazel run "$TARGET"

            MANIFEST=$(bazel cquery "$TARGET" --output=files --output_groups=deploy_manifest)
            bazel build --output_groups=deploy_manifest --remote_download_outputs=all "$TARGET"
            REGISTRY=$(jq -r '.operations[0].registry' "$MANIFEST")
            REPOSITORY=$(jq -r '.operations[0].repository' "$MANIFEST")
            DIGEST=$(jq -r '.operations[0].root.digest' "$MANIFEST")

            IMAGE_TARGET=$(bazel query "labels(image, $TARGET)" --output=label)
            TAG=$(jq -r '.operations[0].tags[] | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+(-debug)?$"))' "$MANIFEST")

            MATRIX=$(echo "$MATRIX" | jq -c --arg image "${REGISTRY}/${REPOSITORY}" --arg tag "$TAG" --arg digest "$DIGEST" --arg target "$IMAGE_TARGET" '. + [{"image": $image, "tag": $tag, "digest": $digest, "target": $target}]')
          done
          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"

  attest:
    name: Attest ${{ matrix.image }}:${{ matrix.tag }}
    if: github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    strategy:
      matrix: ${{ fromJSON(needs.build.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-version: v1.27.0
          bazelisk-cache: true
          repository-cache: true
          external-cache: true
          cache-save: false
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download SBOM
        run: |
          bazel build --output_groups=sbom --remote_download_outputs=all "${{ matrix.target }}"
          SBOM_FILE=$(bazel cquery "${{ matrix.target }}" --output=files --output_groups=sbom)
          cp "$SBOM_FILE" sbom.spdx.json

      - name: Attest provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ matrix.digest }}
          push-to-registry: true

      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ matrix.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

  # ---------------------------------------------------------------------------
  # Terraform deploys, orchestrated via Aspect CLI.
  #
  # `aspect plan` / `aspect apply` walk the ordered list of roots from
  # `.aspect/stdlib.axl` (`TF_ROOTS`). Same commands work locally; CI's job
  # is just to provide the auth and post the plan to PR.
  # ---------------------------------------------------------------------------

  plan:
    name: Plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-version: v1.27.0
          bazelisk-cache: true
          repository-cache: true
          external-cache: true
          cache-save: false
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Install Aspect CLI
        run: |
          set -euo pipefail
          # Resolve latest release tag from GitHub, then download that asset.
          # No setup-aspect-cli action exists yet; this is the documented
          # Linux CI install pattern.
          TAG=$(curl -fsSL https://api.github.com/repos/aspect-build/aspect-cli/releases/latest | jq -r .tag_name)
          curl -fsSL \
            "https://github.com/aspect-build/aspect-cli/releases/download/${TAG}/aspect-cli-x86_64-unknown-linux-musl" \
            -o /tmp/aspect
          chmod +x /tmp/aspect
          sudo mv /tmp/aspect /usr/local/bin/aspect
          aspect --version

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/874944788122/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-actions-senku@senku-prod.iam.gserviceaccount.com

      - name: Plan
        id: plan
        run: aspect plan
        continue-on-error: true

      - name: Comment on PR
        uses: actions/github-script@v9
        with:
          script: |
            const marker = `<!-- tf-plan -->`;
            const output = ${{ toJSON(steps.plan.outputs.stdout) }};
            const body = `${marker}\n### Terraform Plan\n\`\`\`\n${output.substring(0, 60000)}\n\`\`\``;
            const comments = await github.paginate(github.rest.issues.listComments, {
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Apply
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-version: v1.27.0
          bazelisk-cache: true
          repository-cache: true
          external-cache: true
          cache-save: false
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Install Aspect CLI
        run: |
          set -euo pipefail
          # Resolve latest release tag from GitHub, then download that asset.
          # No setup-aspect-cli action exists yet; this is the documented
          # Linux CI install pattern.
          TAG=$(curl -fsSL https://api.github.com/repos/aspect-build/aspect-cli/releases/latest | jq -r .tag_name)
          curl -fsSL \
            "https://github.com/aspect-build/aspect-cli/releases/download/${TAG}/aspect-cli-x86_64-unknown-linux-musl" \
            -o /tmp/aspect
          chmod +x /tmp/aspect
          sudo mv /tmp/aspect /usr/local/bin/aspect
          aspect --version

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/874944788122/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-actions-senku@senku-prod.iam.gserviceaccount.com
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: europe-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Apply
        run: aspect apply

  terraform:
    name: ${{ github.event_name == 'push' && 'Apply' || 'Plan' }} (${{ matrix.dir }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    strategy:
      matrix:
        dir:
          - bazel/terraform
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/874944788122/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-actions-senku@senku-prod.iam.gserviceaccount.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.8

      - name: Init
        run: terraform init

      - name: Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const marker = `<!-- tf-plan:${{ matrix.dir }} -->`;
            const output = ${{ toJSON(steps.plan.outputs.stdout) }};
            const body = `${marker}\n### Terraform Plan (\`${{ matrix.dir }}\`)\n\`\`\`\n${output.substring(0, 60000)}\n\`\`\``;
            const comments = await github.paginate(github.rest.issues.listComments, {
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }

      - name: Plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Apply
        if: github.event_name == 'push'
        run: terraform apply -auto-approve tfplan

