---
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/874944788122/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-actions-senku@senku-prod.iam.gserviceaccount.com

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-version: v1.27.0
          bazelisk-cache: true
          repository-cache: true
          bazelrc: |
            common --config=ci

      - name: Test
        run: bazel test //...

      - name: Build
        run: bazel build //...

  push:
    name: Push images
    if: github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    outputs:
      matrix: ${{ steps.meta.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/874944788122/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-actions-senku@senku-prod.iam.gserviceaccount.com

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-version: v1.27.0
          bazelisk-cache: true
          repository-cache: true
          bazelrc: |
            common --config=ci
            build --stamp

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images and collect metadata
        id: meta
        run: |
          set -euxo pipefail
          TARGETS=$(bazel query 'kind("image_push rule", //...)' --output=label)
          MATRIX="[]"
          for TARGET in $TARGETS; do
            bazel run "$TARGET"

            MANIFEST=$(bazel cquery "$TARGET" --output=files --output_groups=deploy_manifest)
            bazel build --output_groups=deploy_manifest "$TARGET"
            REGISTRY=$(jq -r '.operations[0].registry' "$MANIFEST")
            REPOSITORY=$(jq -r '.operations[0].repository' "$MANIFEST")
            DIGEST=$(jq -r '.operations[0].root.digest' "$MANIFEST")

            IMAGE_TARGET=$(bazel query "labels(image, $TARGET)" --output=label)
            bazel build --output_groups=sbom "$IMAGE_TARGET"
            SBOM_FILE=$(bazel cquery "$IMAGE_TARGET" --output=files --output_groups=sbom)
            cp "$SBOM_FILE" "/tmp/$(basename "$SBOM_FILE")"

            MATRIX=$(echo "$MATRIX" | jq -c --arg image "${REGISTRY}/${REPOSITORY}" --arg digest "$DIGEST" --arg sbom "$(basename "$SBOM_FILE")" '. + [{"image": $image, "digest": $digest, "sbom": $sbom}]')
          done
          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: /tmp/*.spdx.json

  attest:
    name: Attest ${{ matrix.image }}
    if: github.event_name == 'push'
    needs: [push]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      attestations: write
      artifact-metadata: write
    strategy:
      matrix: ${{ fromJSON(needs.push.outputs.matrix) }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download SBOMs
        uses: actions/download-artifact@v4
        with:
          name: sboms

      - name: Attest provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ matrix.digest }}
          push-to-registry: true

      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ matrix.digest }}
          sbom-path: ${{ matrix.sbom }}
          push-to-registry: true
