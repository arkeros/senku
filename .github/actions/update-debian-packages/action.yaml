name: Update Debian Packages
description: Update Debian packages and lockfiles and create a PR if changed
inputs:
  manifests:
    description: |
      Space-separated list of manifest entries. Each entry is `<path>` or
      `<path>:<repo>`. When the bazel repo name does not match
      `basename(path, .yaml) | tr - _`, supply it explicitly with `:<repo>`.
    required: true
  token:
    description: 'GitHub token for creating PRs and enabling auto-merge'
    required: true
outputs:
  update-needed:
    description: 'Whether packages were updated'
    value: ${{ steps.update-packages.outputs.update_needed }}
  pr-number:
    description: 'Pull request number if created'
    value: ${{ steps.create-pr.outputs.pull-request-number }}
runs:
  using: composite
  steps:
    - name: Update and lock all manifests
      id: update-packages
      shell: bash
      run: |
        print_update_diff() {
          echo "::group::Debian package update diff"
          echo "Changed files:"
          git diff --name-status || true
          echo
          echo "Diff stat:"
          git diff --stat || true
          echo
          echo "Lockfile sha256 changes:"
          git diff -- '**/*.lock.json' | grep -E '^[+-].*"sha256"' || true
          echo
          echo "Lockfile package/version/url changes (first 400 lines):"
          git diff -- '**/*.lock.json' \
            | grep -E '^[+-].*"(name|version|sha256|urls?)"' \
            | sed -n '1,400p' || true
          echo "::endgroup::"
        }

        for entry in ${{ inputs.manifests }}; do
          manifest="${entry%%:*}"
          if [ "$entry" = "$manifest" ]; then
            repo=$(basename "$manifest" .yaml | tr '-' '_')
          else
            repo="${entry#*:}"
          fi
          echo "::group::Update ${manifest} (${repo})"
          knife apt update "$PWD/$manifest"
          echo "Snapshot URLs in ${manifest}:"
          grep -nE 'snapshot(-cloudflare)?\.debian\.org/archive/(debian|debian-security)/[0-9]{8}T[0-9]{6}Z' "$manifest" || true
          bazel run "@${repo}//:lock"
          echo "::endgroup::"
        done

        if [ -z "$(git diff --name-only)" ]; then
          echo "No changes detected."
          echo "update_needed=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        # If no sha256 values changed in lock files, only snapshot URLs were
        # updated — the actual binaries are identical. Discard and skip.
        # Avoid `grep -q` here: with `pipefail`, an early grep exit can SIGPIPE
        # `git diff` and make a matching pipeline look like "no match".
        if ! git diff -- '**/*.lock.json' | grep -E '^[+-].*"sha256"' >/dev/null; then
          print_update_diff
          echo "Only snapshot URLs changed, no binary package changes. Skipping."
          git checkout -- .
          echo "update_needed=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        print_update_diff
        echo "update_needed=true" >> $GITHUB_OUTPUT
    - name: Create Pull Request
      if: steps.update-packages.outputs.update_needed == 'true'
      id: create-pr
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ inputs.token }}
        commit-message: 'chore: update debian packages'
        branch: update-debian-packages
        delete-branch: true
        title: 'chore: update debian packages'
        body: |
          This PR updates apt packages and lockfiles for all distroless manifests.

          ---

          This PR was automatically created by the Update Debian Packages workflow.
        labels: |
          dependencies
          automated
        assignees: ${{ github.repository_owner }}
    - name: Enable auto-merge
      if: steps.update-packages.outputs.update_needed == 'true' && steps.create-pr.outputs.pull-request-number != ''
      shell: bash
      run: gh pr merge --auto --squash "${{ steps.create-pr.outputs.pull-request-number }}"
      env:
        GH_TOKEN: ${{ inputs.token }}
