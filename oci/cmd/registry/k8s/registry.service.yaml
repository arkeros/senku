apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: registry
  annotations:
    run.googleapis.com/ingress: all
  labels:
    cloud.googleapis.com/location: europe-west3
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      containerConcurrency: 80
      containers:
        - image: registry
          args:
            - --upstream=ghcr.io
            - --repository-prefix=arkeros/senku
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 256Mi
              cpu: 1000m
          startupProbe:
            httpGet:
              path: /v2/
              port: 8080
          livenessProbe:
            httpGet:
              path: /v2/
              port: 8080
  traffic:
    - latestRevision: true
      percent: 100
