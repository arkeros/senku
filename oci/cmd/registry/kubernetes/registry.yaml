apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    iam.gke.io/gcp-service-account: registry-sa@senku-prod.iam.gserviceaccount.com
  name: registry
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: default
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: registry
  strategy: {}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry
    spec:
      containers:
      - args:
        - --upstream=ghcr.io
        - --repository-prefix=arkeros/senku
        image: registry
        livenessProbe:
          httpGet:
            path: /v2/
            port: 8080
        name: app
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "1"
            memory: 256Mi
          requests:
            cpu: 250m
            memory: 256Mi
        startupProbe:
          httpGet:
            path: /v2/
            port: 8080
      serviceAccountName: registry
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: registry
  namespace: default
spec:
  maxReplicas: 3
  metrics:
  - resource:
      name: cpu
      target:
        averageUtilization: 80
        type: Utilization
    type: Resource
  minReplicas: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: registry
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: default
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app.kubernetes.io/name: registry
  type: ClusterIP
