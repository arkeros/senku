schemaVersion: 2.0.0
metadataTest:
  envVars:
    - key: SSL_CERT_FILE
      value: /etc/ssl/certs/ca-certificates.crt
fileExistenceTests:
  # Hummingbird's ca-certificates rpm ships a static bundle at
  # /etc/ssl/certs/ca-bundle.crt plus a Debian-compat symlink at
  # /etc/ssl/certs/ca-certificates.crt (which is where SSL_CERT_FILE
  # points). The /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem path is
  # *not* checked in — it's normally generated by `update-ca-trust
  # extract` at install time, which we don't run inside the image.
  - name: 'ca-certificates (debian-compat path)'
    path: '/etc/ssl/certs/ca-certificates.crt'
    shouldExist: true
  - name: 'ca-bundle (RHEL canonical static)'
    path: '/etc/ssl/certs/ca-bundle.crt'
    shouldExist: true
  - name: 'mailcap'
    path: '/etc/mailcap'
    shouldExist: true
  - name: 'mime types'
    path: '/etc/mime.types'
    shouldExist: true
  - name: 'tzdata UTC'
    path: '/usr/share/zoneinfo/UTC'
    shouldExist: true
  - name: 'passwd'
    path: '/etc/passwd'
    shouldExist: true
  - name: 'group'
    path: '/etc/group'
    shouldExist: true
  # os-release(5): canonical at /usr/lib/os-release, /etc/os-release is a
  # symlink. base-files ships the symlink on debian; senku synthesizes it
  # for hummingbird via //oci/distroless/common:etc_os_release_symlink.
  - name: 'os-release canonical'
    path: '/usr/lib/os-release'
    shouldExist: true
  - name: 'os-release /etc symlink'
    path: '/etc/os-release'
    shouldExist: true
  - name: 'tmp dir'
    path: '/tmp'
    shouldExist: true
  - name: 'rpmdb sqlite'
    path: '/usr/lib/sysimage/rpm/rpmdb.sqlite'
    shouldExist: true
  - name: 'no shell'
    path: '/bin/sh'
    shouldExist: false
fileContentTests:
  - name: 'os-release has ID=hummingbird'
    path: '/usr/lib/os-release'
    expectedContents: ['(?m)^ID="hummingbird"$']
  - name: 'os-release brand'
    path: '/usr/lib/os-release'
    expectedContents: ['Hummingbird-derived']
