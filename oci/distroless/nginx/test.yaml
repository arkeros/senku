schemaVersion: 2.0.0
metadataTest:
  entrypoint: ['/usr/sbin/nginx', '-e', '/dev/stderr', '-g', 'daemon off;']
fileExistenceTests:
  - name: 'nginx binary exists'
    path: '/usr/sbin/nginx'
    shouldExist: true
  - name: 'nginx config exists'
    path: '/etc/nginx/nginx.conf'
    shouldExist: true
  - name: 'default server config exists'
    path: '/etc/nginx/conf.d/default.conf'
    shouldExist: true
  # Without these per-Google PACKAGE_METADATA.md files, syft's dpkg cataloger
  # returns zero packages and `grype <image>` reports false negatives on every
  # Debian CVE. nginx is the leaf package; libc6 covers the base closure.
  - name: 'dpkg status.d entry for nginx'
    path: '/var/lib/dpkg/status.d/nginx'
    shouldExist: true
  - name: 'dpkg status.d entry for libc6'
    path: '/var/lib/dpkg/status.d/libc6'
    shouldExist: true
commandTests:
  - name: 'nginx config is valid'
    command: '/usr/sbin/nginx'
    args: ['-t', '-e', '/dev/stderr']
    exitCode: 0
fileContentTests:
  - name: 'nginx listens on 8080'
    path: '/etc/nginx/conf.d/default.conf'
    expectedContents: ['listen 8080']
