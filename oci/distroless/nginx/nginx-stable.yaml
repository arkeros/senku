#  Anytime this file is changed, the lockfile needs to be regenerated.
#
#  To generate the nginx-stable.lock.json run the following command
#
#     bazel run @nginx_stable//:lock
version: 1
sources:
  - channel: trixie nginx
    url: https://nginx.org/packages/debian
  - channel: trixie main
    urls:
      - https://snapshot-cloudflare.debian.org/archive/debian/20260406T144517Z
      - https://snapshot.debian.org/archive/debian/20260406T144517Z
  - channel: trixie-security main
    url: https://snapshot-cloudflare.debian.org/archive/debian-security/20260405T205725Z
archs:
  - amd64
  - arm64
packages:
  - nginx
