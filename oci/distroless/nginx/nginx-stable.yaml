#  Anytime this file is changed, the lockfile needs to be regenerated:
#
#     bazel run @nginx_stable//:lock
#
#  nginx.org only publishes for stable Debian codenames (latest: trixie), so
#  the nginx package itself stays on trixie. Transitive runtime deps (libc6
#  etc.) come from Debian unstable to track the same package set as the cc
#  base image — avoids a dual-libc6 SBOM.
version: 1
sources:
  - channel: trixie nginx
    url: https://nginx.org/packages/debian
  - channel: unstable main contrib
    urls:
      - https://snapshot-cloudflare.debian.org/archive/debian/20260501T000000Z
      - https://snapshot.debian.org/archive/debian/20260501T000000Z
archs:
  - amd64
  - arm64
packages:
  - nginx
