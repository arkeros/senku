#  Anytime this file is changed, the lockfile needs to be regenerated.
#
#  To generate the nginx-mainline.lock.json run the following command
#
#     bazel run @nginx_mainline//:lock
version: 1
sources:
  - channel: trixie nginx
    url: https://nginx.org/packages/mainline/debian
  - channel: trixie main
    urls:
      - https://snapshot-cloudflare.debian.org/archive/debian/20260408T144019Z
      - https://snapshot.debian.org/archive/debian/20260408T144019Z
  - channel: trixie-security main
    url: https://snapshot-cloudflare.debian.org/archive/debian-security/20260407T211519Z
archs:
  - amd64
  - arm64
packages:
  - nginx
