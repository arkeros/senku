apiVersion: bifrost.apotema.cloud/v1alpha1
kind: CronJob
metadata:
  name: crossdocking-stock-flow
spec:
  image: stock-flow
  args:
    - sync
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
  volumeMounts:
    - name: secrets
      mountPath: /run/secrets
  volumes:
    - name: secrets
      secret:
        secretName: stock-flow-env
        items:
          - key: latest
            path: env.json
  schedule:
    cron: "0 12 * * *"
    timeZone: Europe/Madrid
  job:
    parallelism: 1
    completions: 1
    maxRetries: 3
    timeoutSeconds: 600
  gcp:
    projectId: senku-prod
    projectNumber: "874944788122"
    cloudScheduler:
      region: europe-west1
      retryCount: 3
    cloudRun:
      region: europe-west1
      executionEnvironment: gen2
      vpcAccessEgress: private-ranges-only
      vpcAccessConnector: projects/senku-prod/locations/europe-west1/connectors/internal
      secrets: stock-flow-env:projects/123456789/secrets/custom--stock-flow-env
  kubernetes:
    namespace: jobs
